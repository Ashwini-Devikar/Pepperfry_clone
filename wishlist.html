<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - Pepperfry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar (Simplified) -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <img src="logo.svg" alt="Pepperfry" height="32">
        </a>
        <div class="ms-auto">
             <a href="index.html" class="text-decoration-none text-dark me-3">Continue Shopping</a>
             <a href="cart.html" class="text-decoration-none text-dark"><i class="bi bi-cart"></i> Cart</a>
        </div>
    </div>
</nav>

<div class="container mb-5">
    <h3 class="fw-bold mb-4">My Wishlist <span class="text-muted fs-6">(<span id="wishlist-count">0</span> items)</span></h3>
    
    <div id="wishlist-container" class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
        <!-- Items will be injected here -->
    </div>
    
    <!-- Empty State -->
    <div id="empty-wishlist-msg" class="text-center py-5" style="display: none;">
        <i class="bi bi-heart text-muted" style="font-size: 3rem;"></i>
        <p class="mt-3 text-muted">Your wishlist is empty.</p>
        <a href="index.html" class="btn btn-outline-orange rounded-pill">Start Shopping</a>
    </div>
</div>

<!-- Toast for Cart notifications -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
  <div id="cartToast" class="toast align-items-center text-white bg-dark border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body">
        <i class="bi bi-check-circle-fill text-success me-2"></i>
        Item added to your cart successfully!
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script>
    function loadWishlist() {
        const wishlist = JSON.parse(localStorage.getItem('pepperfry_wishlist')) || [];
        const container = document.getElementById('wishlist-container');
        const countSpan = document.getElementById('wishlist-count');
        const emptyMsg = document.getElementById('empty-wishlist-msg');

        countSpan.innerText = wishlist.length;

        if (wishlist.length === 0) {
            container.innerHTML = '';              
            emptyMsg.style.display = 'block';
            return;
        }

        emptyMsg.style.display = 'none';
        container.innerHTML = wishlist.map((item) => `
            <div class="col">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="position-relative">
                        <img src="${item.image}" class="card-img-top" alt="${item.name}" style="height: 250px; object-fit: cover;">
                        <div class="position-absolute top-0 end-0 p-2">
                            <button class="btn btn-light rounded-circle shadow-sm p-0 d-flex align-items-center justify-content-center" 
                                    style="width: 32px; height: 32px; color: #ff7043;" 
                                    onclick="removeFromWishlist('${item.name}')" title="Remove from Wishlist">
                                <i class="bi bi-heart-fill"></i>
                            </button>
                        </div>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title text-truncate" title="${item.name}">${item.name}</h6>
                        <p class="card-text fw-bold" style="color: #ff6a2d;">₹${item.price}</p>
                        <button class="btn btn-outline-orange w-100 mt-auto rounded-pill" 
                                onclick="addToCart('${item.name}', ${item.price}, '${item.image}')">
                            ADD TO CART
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function removeFromWishlist(name) {
        let wishlist = JSON.parse(localStorage.getItem('pepperfry_wishlist')) || [];
        wishlist = wishlist.filter(item => item.name !== name);
        localStorage.setItem('pepperfry_wishlist', JSON.stringify(wishlist));
        loadWishlist();
    }

    // Load items when page opens
    window.onload = function() {
        loadWishlist();
        // Also update cart badge from script.js logic if needed
        if(typeof updateCartBadge === 'function') updateCartBadge();
    };
</script>
</body>
</html>
