<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Pepperfry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar (Simplified) -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <img src="logo.svg" alt="Pepperfry" height="32">
        </a>
        <div class="ms-auto">
             <a href="index.html" class="text-decoration-none text-dark me-3">Continue Shopping</a>
             <a href="cart.html" class="text-decoration-none text-dark position-relative">
                <i class="bi bi-cart"></i> Cart
                <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.65rem; display: none;">0</span>
             </a>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="row">
        <div class="col-md-6">
            <!-- Placeholder Image -->
            <div id="product-image-container" class="bg-light d-flex align-items-center justify-content-center rounded" style="height: 400px; overflow: hidden;">
                <i class="bi bi-image text-muted" style="font-size: 4rem;"></i>
            </div>
        </div>
        <div class="col-md-6">
            <h2 id="product-name" class="fw-bold">Product Name</h2>
            <p id="product-category" class="text-muted">Category: Furniture</p>
            <h3 id="product-price" class="text-orange fw-bold" style="color: #ff6a2d;">₹12,999</h3>
            <p class="mt-3">
                This is a placeholder description for the product. It features high-quality materials and excellent craftsmanship suitable for your home.
            </p>
            
            <div class="d-grid gap-2 d-md-block mt-4">
                <button class="btn btn-lg text-white" style="background-color: #ff6a2d;" onclick="addToCartFromPage()">ADD TO CART</button>
                <button class="btn btn-lg btn-outline-secondary">WISHLIST</button>
            </div>
            
            <div class="mt-4">
                <small class="text-muted"><i class="bi bi-truck"></i> Free Shipping</small>
                <br>
                <small class="text-muted"><i class="bi bi-shield-check"></i> 12 Months Warranty</small>
            </div>
        </div>
    </div>
</div>

<!-- Toast for Cart notifications -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
  <div id="cartToast" class="toast align-items-center text-white bg-dark border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body">
        <i class="bi bi-check-circle-fill text-success me-2"></i>
        Item added to your cart successfully!
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script>
    // Get product name from URL
    const params = new URLSearchParams(window.location.search);
    const productName = params.get('name');
    
    // Find the product object from the global 'products' array in script.js
    let currentProduct = null;
    if (typeof products !== 'undefined' && productName) {
        currentProduct = products.find(p => p.name === decodeURIComponent(productName));
    }

    if (currentProduct) {
        // Update page with product details
        document.getElementById('product-name').innerText = currentProduct.name;
        document.title = currentProduct.name + " - Pepperfry";
        document.getElementById('product-category').innerText = "Category: " + currentProduct.category;
        document.getElementById('product-price').innerText = "₹" + currentProduct.price.toLocaleString('en-IN');
        
        const imgContainer = document.getElementById('product-image-container');
        imgContainer.innerHTML = `<img src="${currentProduct.image}" class="img-fluid" style="max-height: 100%; width: auto;">`;
    } else if (productName) {
        // Fallback if product not found in array (e.g. manual URL entry)
        document.getElementById('product-name').innerText = decodeURIComponent(productName);
    }

    function addToCartFromPage() {
        if (currentProduct) {
            addToCart(currentProduct.name, currentProduct.price, currentProduct.image);
        } else {
            // Fallback for legacy/unknown items
            const name = document.getElementById('product-name').innerText;
            addToCart(name, 12999, 'images/frydeal1.webp'); 
        }
    }
</script>
</body>
</html>
