<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Shopping Cart - Pepperfry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="row">
        <!-- Cart Items -->
        <div class="col-lg-8">
            <h4 class="fw-bold mb-4">Your Cart (<span id="cart-count">0</span> items)</h4>
            <div id="cart-items-container">
                <!-- Cart items will be injected here -->
                <p>Your cart is empty. <a href="index.html">Continue shopping</a>.</p>
            </div>
        </div>                     

        <!-- Order Summary -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm p-4 sticky-top" style="top: 20px;">
                <h5 class="fw-bold mb-3">Order Summary</h5>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Total MRP</span>
                    <span id="summary-mrp">₹0</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Shipping</span>
                    <span class="text-success">FREE</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between mb-4">
                    <span class="fw-bold fs-5">Total Amount</span>
                    <span class="fw-bold fs-5" style="color: #ff6a2d;">₹<span id="cart-total">0</span></span>
                </div>
                <button class="btn btn-dark w-100 py-3 fw-bold rounded-1" style="background-color: #ff6a2d; border: none;">
                    PLACE ORDER
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    function loadCart() {
        const myCart = JSON.parse(localStorage.getItem('pepperfry_cart')) || [];
        const itemsContainer = document.getElementById('cart-items-container');
        const cartCount = document.getElementById('cart-count');
        const summaryMrp = document.getElementById('summary-mrp');
        const cartTotal = document.getElementById('cart-total');

        cartCount.innerText = myCart.length;

        if (myCart.length === 0) {
            itemsContainer.innerHTML = '<div class="text-center p-5 bg-light rounded"><p>Your cart is empty. <a href="index.html">Continue shopping</a>.</p></div>';
            summaryMrp.innerText = '₹0';
            cartTotal.innerText = '0';
            return;
        }

        let total = 0;
        itemsContainer.innerHTML = myCart.map((item, index) => {
            total += item.price;
            return `
                <div class="card mb-3 border-0 shadow-sm">
                    <div class="row g-0">
                        <div class="col-md-3 d-flex align-items-center justify-content-center">
                            <img src="${item.image}" class="img-fluid rounded-start" alt="${item.name}" style="max-height: 150px; padding: 1rem;">
                        </div>
                        <div class="col-md-9">
                            <div class="card-body d-flex flex-column h-100">
                                <div class="d-flex justify-content-between">
                                    <h6 class="card-title mb-1">${item.name}</h6>
                                    <p class="card-text fw-bold mb-1">₹${item.price}</p>
                                </div>
                                <p class="card-text text-muted small">Standard Shipping</p>
                                <div class="mt-auto text-end">
                                    <button class="btn btn-sm btn-outline-danger" onclick="removeItem(${index})">
                                        <i class="bi bi-trash"></i> Remove
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        
        summaryMrp.innerText = `₹${total}`;
        cartTotal.innerText = total;
    }

    function removeItem(index) {
        let myCart = JSON.parse(localStorage.getItem('pepperfry_cart')) || [];
        myCart.splice(index, 1);
        localStorage.setItem('pepperfry_cart', JSON.stringify(myCart));
        loadCart(); // Refresh the list
        updateCartBadge(); // Also update the badge in the main nav if it exists
    }

    // This function might be in a global script, but for standalone cart page, it's good to have it.
    function updateCartBadge() {
        let myCart = JSON.parse(localStorage.getItem('pepperfry_cart')) || [];
        const badge = document.getElementById('cart-badge'); // Assuming a badge in a shared header
        if (badge) {
            badge.innerText = myCart.length;
            badge.style.display = myCart.length > 0 ? 'block' : 'none';
        }
    }

    window.onload = loadCart;
</script>
</body>
</html>
